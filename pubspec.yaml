name: getx_project
version: 1.0.0+1
publish_to: none
description: A new Flutter project.
environment: 
  sdk: '>=3.0.1 <4.0.0'

dependencies: 
  flutter: 
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: 4.6.5
  flutter_barcode_scanner: ^2.0.0
  # form_builder_validators: ^9.0.0
  # flutter_form_builder: ^9.0.0
  # get_storage: ^2.1.1
  data_table_2: ^2.5.3
  hexcolor: ^3.0.1
  syncfusion_flutter_datagrid: ^22.1.38
  syncfusion_flutter_core: ^22.1.38
  google_fonts: ^5.1.0
  get_storage: ^2.1.1
  intl: ^0.19.0
  connectivity_plus: ^3.0.1
  fl_chart: ^0.60.0
  skeletonizer: ^1.4.3
  flutter_secure_storage: ^9.2.2
  

dev_dependencies: 
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^2.0.0
  flutter_native_splash: ^2.3.7
  flutter_test: 
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/google_fonts/

# App launcher icon — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_short.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo_adaptive_fg.png"

# Native splash screen — run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo_short.png"
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: "assets/images/logo_adaptive_fg.png"

